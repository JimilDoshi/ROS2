slam_toolbox:
  ros__parameters:

    # Plugin params
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # ROS Parameters
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    use_map_saver: true
    mode: mapping

    debug_logging: false
    throttle_scans: 1
    transform_publish_period: 0.02
    map_update_interval: 1.0
    resolution: 0.05
    max_laser_range: 12.0
    minimum_time_interval: 0.2
    transform_timeout: 0.5
    tf_buffer_duration: 60.0
    stack_size_to_use: 40000000
    enable_interactive_mode: true
    message_filter_queue_size: 100
    scan_queue_size: 100

    # General Parameters
    use_scan_matching: true
    use_scan_barycenter: true
    minimum_travel_distance: 0.05
    minimum_travel_heading: 0.05
    scan_buffer_size: 20
    scan_buffer_maximum_scan_distance: 12.0
    link_match_minimum_response_fine: 0.1
    link_scan_maximum_distance: 2.0       # increased — allows matching after larger drift
    loop_search_maximum_distance: 5.0     # increased — finds loop closures further away
    do_loop_closing: true
    loop_match_minimum_chain_size: 5      # reduced — triggers loop closure sooner
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.3   # reduced — accepts weaker loop closure matches
    loop_match_minimum_response_fine: 0.4     # reduced — same

    # Correlation Parameters — wider search to find correct pose after drift
    correlation_search_space_dimension: 0.8   # was 0.5 — search wider area
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1

    # Loop Closure Parameters
    loop_search_space_dimension: 10.0    # was 8.0 — larger loop closure search
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # Scan Matcher — allow aggressive correction of drift
    distance_variance_penalty: 0.2      # was 0.3 — penalise position jumps even less
    angle_variance_penalty: 0.3         # was 0.5 — allow larger heading corrections

    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.523   # was 0.349 (~20°) → now ~30° wider coarse search
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true
    min_pass_through: 2
    occupancy_threshold: 0.1
    publish_tf: true
    minimum_laser_range: 0.1
