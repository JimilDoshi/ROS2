slam_toolbox:
  ros__parameters:
    # Solver
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI

    # Frames
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    mode: mapping

    # TF tolerance — increase to handle network latency between Pi and laptop
    transform_timeout: 0.5
    tf_buffer_duration: 30.0

    # Message filter queue — increase to prevent dropped scans
    message_filter_queue_size: 100
    scan_queue_size: 100

    # Scan matching
    use_scan_matching: true
    minimum_score: 0.3
    use_scan_barycenter: true
    minimum_travel_distance: 0.02
    minimum_travel_heading: 0.05
    scan_buffer_size: 10
    scan_buffer_maximum_scan_distance: 10.0

    # Map
    resolution: 0.05
    max_laser_range: 12.0
    minimum_time_interval: 0.2
    map_update_interval: 0.5

    use_sim_time: false
    covariance_score_threshold: 0.3
